name: Validate

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check license manifest
        run: python3 scripts/generate_licenses.py --check

  patch-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Checkout vendor sources
        run: python3 scripts/checkout_vendor.py
      - name: Verify patches apply cleanly
        run: |
          git -C vendor/mozc checkout -- .
          git -C vendor/merge-ut-dictionaries checkout -- .
          python3 scripts/apply_patches.py

  prepare-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install jaconv
      - name: Run prepare_build (without version bump side effects)
        run: |
          python3 scripts/checkout_vendor.py
          python3 scripts/apply_patches.py
          python3 scripts/integrate_dictionary.py
          python3 scripts/generate_licenses.py --check
